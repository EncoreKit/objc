name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    name: Validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: pod lib lint
        run: pod lib lint EncoreObjC.podspec --allow-warnings

  publish:
    name: Publish to CocoaPods trunk
    runs-on: macos-15
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: pod trunk push
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push EncoreObjC.podspec --allow-warnings
